<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GetHereEmu - Mobile Emulator Distribution</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-color: #c5c6c7;
            --accent-color: #66fcf1;
            --accent-hover: #45a29e;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(102, 252, 241, 0.1);
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            font-size: 15px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-ios {
            background-color: var(--accent-color);
            color: #0b0c10;
        }

        .btn-ios:hover {
            background-color: var(--accent-hover);
        }

        .btn-android {
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
        }

        .btn-android:hover {
            background-color: rgba(102, 252, 241, 0.1);
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HereEmu</h1>
        <p>Mobil emülatör kurulum merkezine hoş geldiniz. Cihazınıza uygun olan yükleme seçeneğini seçin.</p>
        
        <div class="btn-group">
            <!-- iOS için doğrudan Apple Protokolü tetikleyen buton -->
            <a href="apple-wm-service://poetic-rolypoly-99e313.netlify.app/profil.mobileconfig" class="btn btn-ios">
                iOS Profil Yükle
            </a>
            
            <!-- Android indirme butonu -->
            <a href="app.apk" class="btn btn-android" download>
                Android APK İndir
            </a>
        </div>
        
        <div class="footer">
            &copy; 2026 HereEmu. Tüm hakları saklıdır.
        </div>
    </div>

</body>
</html>

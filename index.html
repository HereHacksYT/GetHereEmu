<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetHereEmu - Mobile & PC Emulator Distribution</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-image: url('https://i.ibb.co/Zpq9RmdH/Here-Emu.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.1s ease, background-color 0.2s ease;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-ios {
            background-color: #007aff;
            color: #ffffff;
        }

        .btn-android {
            background-color: #34a853;
            color: #ffffff;
        }

        .btn-pc {
            background-color: #5865F2; /* Şık bir mavi/mor tonu */
            color: #ffffff;
        }

        .video-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-title {
            font-size: 14px;
            color: #dddddd;
            margin-bottom: 12px;
            font-weight: 500;
        }

        video {
            width: 100%;
            border-radius: 14px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background-color: #000000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GetHereEmu</h1>
        
        <!-- iOS Butonu: Paylaş menüsü rehberiyle eklemek isteyen mobil kullanıcılar için -->
        <a href="https://hereemu.onrender.com" target="_blank" class="btn btn-ios">iOS Uygulaması Olarak Ekle</a>
        
        <!-- Android Paketi Butonu: Repodaki app.apk dosyasını indirir -->
        <a href="app.apk" class="btn btn-android" download="app.apk">Android (.APK) İndir</a>

        <!-- Bilgisayar Butonu: Sadece ismi yazar ve doğrudan yeni sekmede siteyi açar -->
        <a href="https://hereemu.onrender.com" target="_blank" class="btn btn-pc">Bilgisayar</a>

        <!-- Nasıl Yapılır Video Alanı (iOS için rehber) -->
        <div class="video-container">
            <div class="video-title">👇 İOS Ana Ekrana Nasıl Eklenir? İzleyin 👇</div>
            <video controls playsinline>
                <source src="how.mp4" type="video/mp4">
                Tarayıcınız video oynatmayı desteklemiyor.
            </video>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetHereEmu - Yönlendiriliyorsunuz</title>
    <style>
        /* Sayfa yüklenirken kullanıcıya tamamen siyah ve temiz bir ekran göstermek için */
        body { 
            background: #0f0f0f; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .loader {
            font-size: 18px;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <div class="loader">Cihazınız algılanıyor, lütfen bekleyin...</div>

    <script>
        // Kullanıcının tarayıcı/cihaz bilgisini alıyoruz
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;

        // Eğer cihaz iPhone, iPad veya iPod ise direkt ios.html sayfasına gönder
        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            window.location.href = "ios.html";
        } 
        // Eğer cihaz Android ise direkt android.html sayfasına gönder
        else if (/android/i.test(userAgent)) {
            window.location.href = "android.html";
        } 
        // Eğer bilgisayardan (Masaüstü) giriliyorsa varsayılan olarak ios.html sayfasına yönlendir
        else {
            window.location.href = "ios.html";
        }
    </script>
</body>
</html>

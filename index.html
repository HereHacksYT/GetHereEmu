<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GetHereEmu - Mobile Emulator Distribution</title>
    <style>
        :root {
            --card-bg: rgba(16, 20, 30, 0.75);
            --text-color: #e2e8f0;
            --accent-color: #00f2fe;
            --accent-hover: #4facfe;
            --neon-glow: 0 0 20px rgba(0, 242, 254, 0.6);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Senin gönderdiğin orijinal HereEmu arka plan görseli */
            background: url('https://i.ibb.co/Zpq9RmdH/Here-Emu.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 1px rgba(255,255,255,0.15) inset;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(0, 242, 254, 0.25);
        }

        h1 {
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #94a3b8;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: block;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-ios {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            color: #050508;
            box-shadow: var(--neon-glow);
        }

        .btn-ios:hover {
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.8);
        }

        .btn-android {
            background: transparent;
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-android:hover {
            border-color: var(--accent-color);
            background: rgba(0, 242, 254, 0.07);
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 0.5px;
        }
    </style>
</head>

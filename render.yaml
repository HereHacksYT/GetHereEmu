services:
  - type: web
    name: gethereemu-site
    env: static
    buildCommand: ""
    publishDir: "."
    headers:
      - path: "/*.mobileconfig"
        headers:
          - key: "Content-Type"
            value: "application/x-apple-aspen-config"
          - key: "Content-Disposition"
            value: "attachment; filename=\"profil.mobileconfig\""
      - path: "/*.apk"
        headers:
          - key: "Content-Type"
            value: "application/vnd.android.package-archive"
